<form [formGroup]="empresaForm" (ngSubmit)="save()">

<div class="grid grid-cols-1 gap-12 py-8">
  <!-- Section 1: Empresa -->
  <section class="space-y-6">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

      <!-- FORM -->
      <div class="lg:col-span-2 space-y-6">
        <div class="bg-white dark:bg-slate-900 p-8 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm space-y-6">

          <div class="flex items-center gap-3">
            <div class="size-8 bg-primary/10 rounded-lg flex items-center justify-center text-primary">
              <span class="material-symbols-outlined">business</span>
            </div>
            <h3 class="text-lg font-black text-slate-900 dark:text-white uppercase tracking-tight">
              Perfil de la Empresa
            </h3>
          </div>

          <div class="grid grid-cols-1 gap-6">

            <!-- Nombre -->
            <div>
              <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">
                Nombre de la Empresa
              </label>
              <input
                formControlName="nombre"
                class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-xl text-sm font-bold p-3 focus:ring-2 focus:ring-primary/20 focus:border-primary"
                type="text" />
            </div>

            <!-- NIT + WEB -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

              <div>
                <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">NIT</label>
                <input
                  formControlName="nit"
                  class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-xl text-sm font-bold p-3 focus:ring-2 focus:ring-primary/20 focus:border-primary"
                  type="text" />
              </div>

              <div>
                <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">Sitio Web</label>
                <input
                  formControlName="sitioWeb"
                  class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-xl text-sm font-bold p-3 focus:ring-2 focus:ring-primary/20 focus:border-primary"
                  type="text" />
              </div>

            </div>

            <!-- Dirección -->
            <div>
              <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">
                Dirección Corporativa
              </label>
              <input
                formControlName="direccion"
                class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-xl text-sm font-bold p-3 focus:ring-2 focus:ring-primary/20 focus:border-primary"
                type="text" />
            </div>

          </div>
        </div>
      </div>

      <!-- LOGO -->
      <div class="bg-white dark:bg-slate-900 p-8 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm flex flex-col items-center justify-center text-center space-y-6">

        <label class="block text-xs font-black text-slate-500 uppercase tracking-widest w-full text-left mb-2">
          Logo Corporativo
        </label>

        <div class="size-40 bg-slate-50 dark:bg-slate-800 border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-2xl flex items-center justify-center overflow-hidden relative group">

          <div class="bg-cover bg-center w-full h-full"
               [style.background-image]="'url(' + previewLogo + ')'">
          </div>

          <input type="file"
                 class="absolute inset-0 opacity-0 cursor-pointer"
                 (change)="onFileSelected($event)" />

        </div>

        <div class="space-y-1">
          <button type="button" class="text-sm font-black text-primary hover:underline">
            Subir nuevo logo
          </button>
          <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">
            PNG o SVG | MAX 2MB
          </p>
        </div>

      </div>
    </div>
  </section>

  <!-- Footer -->
  <div class="flex items-center justify-end gap-3 pb-8">

    <button type="button"
            (click)="empresaForm.reset()"
            class="px-6 py-2.5 text-sm font-black text-slate-600 hover:text-slate-900 transition-colors">
      Restablecer Valores
    </button>

    <button type="submit"
            class="bg-primary text-white px-10 py-3 rounded-xl font-black text-sm hover:opacity-90 transition-all shadow-xl shadow-primary/20">
      Guardar Cambios
    </button>

  </div>
</div>

</form>
